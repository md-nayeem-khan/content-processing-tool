<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Details - Markdown Processor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .book-title {
            color: white;
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .book-info {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }

        .info-item {
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.95em;
        }

        .back-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin-bottom: 20px;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }

        .chapters-container {
            background: white;
            border-radius: 16px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-title {
            color: #333;
            font-size: 1.5em;
            font-weight: 600;
        }

        .add-chapter-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1em;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(40, 167, 69, 0.3);
        }

        .add-chapter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(40, 167, 69, 0.4);
        }

        .chapters-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .chapter-card {
            background: linear-gradient(145deg, #ffffff 0%, #f8f9fa 100%);
            border-radius: 16px;
            padding: 25px;
            border: 2px solid #e9ecef;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        }

        .chapter-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
        }

        .chapter-header-left {
            flex: 1;
        }

        .chapter-actions {
            display: flex;
            gap: 8px;
        }

        .chapter-title {
            color: #2d3748;
            font-size: 1.3em;
            font-weight: 700;
            margin-bottom: 8px;
            line-height: 1.4;
        }

        .chapter-summary {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 0;
        }

        .chapter-status {
            display: inline-flex;
            align-items: center;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 700;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }

        .status-completed {
            background: linear-gradient(135deg, #d4edda 0%, #c3e6cb 100%);
            color: #155724;
            border: 1px solid #b8dacc;
        }

        .status-pending {
            background: linear-gradient(135deg, #fff3e0 0%, #ffeaa7 100%);
            color: #e67e22;
            border: 1px solid #f39c12;
        }

        .sections-container {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e9ecef;
        }

        .sections-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .sections-title {
            font-size: 1em;
            font-weight: 600;
            color: #555;
        }

        .sections-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .section-item {
            background: #f8f9fa;
            border: 1px solid #e1e5e9;
            border-radius: 8px;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .section-item:hover {
            background: #e9ecef;
            border-color: #667eea;
        }

        .section-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title-text {
            font-weight: 600;
            color: #333;
        }

        .section-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 0.85em;
            border-radius: 6px;
        }

        .btn-add-section {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        .btn-add-section:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 600;
            transition: all 0.3s ease;
            flex: 1;
        }

        .btn-edit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-edit:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-delete {
            background: linear-gradient(135deg, #dc3545 0%, #fd7e14 100%);
            color: white;
        }

        .btn-delete:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(220, 53, 69, 0.4);
        }

        .btn-icon {
            background: #6c757d;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s ease;
        }

        .btn-icon:hover {
            background: #5a6268;
            transform: translateY(-1px);
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }

        .empty-state .icon {
            font-size: 3em;
            margin-bottom: 15px;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background-color: white;
            margin: 3% auto;
            padding: 0;
            border-radius: 15px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 25px 50px rgba(0,0,0,0.3);
        }

        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .modal-header h2 {
            margin: 0;
            font-size: 1.5em;
            font-weight: 400;
        }

        .close {
            color: white;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .close:hover {
            opacity: 1;
        }

        .modal-body {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #555;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e1e5e9;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s ease;
        }

        .form-group textarea {
            font-family: 'Courier New', monospace;
            min-height: 400px;
            resize: vertical;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            padding-top: 20px;
            border-top: 1px solid #e1e5e9;
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 2s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <button class="back-btn" onclick="goBack()">← Back to Library</button>
        
        <div class="header">
            <h1 class="book-title" id="bookTitle">Loading...</h1>
            <div class="book-info">
                <div class="info-item" id="bookDescription">Description: Loading...</div>
                <div class="info-item" id="bookCreated">Created: Loading...</div>
                <div class="info-item" id="bookChapters">Chapters: Loading...</div>
            </div>
        </div>

        <div class="chapters-container">
            <div class="section-header">
                <h2 class="section-title">Book Chapters</h2>
                <button class="add-chapter-btn" onclick="openAddChapterModal()">
                    <span>➕ Add Chapter</span>
                </button>
            </div>
            <div id="chaptersContainer" class="loading">
                <div class="spinner"></div>
                <p>Loading chapters...</p>
            </div>
        </div>
    </div>

    <!-- Add/Edit Chapter Modal -->
    <div id="chapterModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">➕ Add New Chapter</h2>
                <span class="close" onclick="closeChapterModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="chapterForm">
                    <div class="form-group">
                        <label for="chapterTitle">📖 Chapter Title</label>
                        <input type="text" id="chapterTitle" name="chapter_title" 
                               placeholder="e.g., Introduction to Markdown" required>
                    </div>

                    <div class="form-group">
                        <label for="chapterSummary">📝 Chapter Summary (optional)</label>
                        <textarea id="chapterSummary" name="chapter_summary" rows="3" 
                                placeholder="Brief summary of this chapter..."></textarea>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeChapterModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="saveChapterBtn">
                            <span>💾 Save Chapter</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Add/Edit Section Modal -->
    <div id="sectionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="sectionModalTitle">➕ Add New Section</h2>
                <span class="close" onclick="closeSectionModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="sectionForm">
                    <div class="form-group">
                        <label for="sectionTitle">📄 Section Title</label>
                        <input type="text" id="sectionTitle" name="section_title" 
                               placeholder="e.g., Introduction" required>
                    </div>

                    <div class="form-group">
                        <label for="sectionContent">📝 Markdown Content</label>
                        <textarea id="sectionContent" name="markdown_content" 
                                placeholder="# Section Title

Write your section content in Markdown format...

## Subsection

Content goes here..."></textarea>
                        <small style="color: #666; font-size: 0.9em; margin-top: 5px; display: block;">
                            Enter your section content in Markdown format. Leave empty to add content later.
                        </small>
                    </div>

                    <div class="modal-footer">
                        <button type="button" class="btn btn-secondary" onclick="closeSectionModal()">Cancel</button>
                        <button type="submit" class="btn btn-primary" id="saveSectionBtn">
                            <span>💾 Save Section</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        let currentBook = null;
        let editingChapterIndex = null;
        let editingSectionId = null;
        let currentChapterForSection = null;

        // Initialize page
        document.addEventListener('DOMContentLoaded', function() {
            loadBook();
        });

        async function loadBook() {
            const urlParams = new URLSearchParams(window.location.search);
            const bookId = urlParams.get('id');
            
            if (!bookId) {
                showError('No book ID provided in URL');
                return;
            }

            try {
                const response = await fetch(`/api/books/${bookId}`);
                
                if (!response.ok) {
                    throw new Error(`Book not found (${response.status})`);
                }
                
                currentBook = await response.json();
                displayBookInfo();
                displayChapters();
                
            } catch (error) {
                console.error('Error loading book:', error);
                showError(`Failed to load book: ${error.message}`);
            }
        }

        function displayBookInfo() {
            document.getElementById('bookTitle').textContent = currentBook.name || 'Untitled Book';
            document.getElementById('bookDescription').textContent = `📝 ${currentBook.description || 'No description'}`;
            document.getElementById('bookCreated').textContent = `📅 Created: ${new Date(currentBook.created_at).toLocaleDateString()}`;
            document.getElementById('bookChapters').textContent = `📄 Chapters: ${currentBook.chapters ? currentBook.chapters.length : 0}`;
        }

        function displayChapters() {
            const container = document.getElementById('chaptersContainer');
            
            if (!currentBook.chapters || currentBook.chapters.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">📖</div>
                        <h3>No chapters yet</h3>
                        <p>Click "Add Chapter" to create your first chapter</p>
                    </div>
                `;
                return;
            }

            const chaptersHtml = currentBook.chapters.map((chapter, chapterIndex) => {
                const sections = chapter.sections || [];
                const sectionsHtml = sections.map(section => {
                    const isCompleted = section.content_status === 'completed';
                    return `
                        <div class="section-item">
                            <div class="section-info">
                                <span class="section-title-text">📄 ${section.title}</span>
                                <span class="chapter-status ${isCompleted ? 'status-completed' : 'status-pending'}" style="font-size: 0.75em; padding: 4px 10px;">
                                    ${isCompleted ? '✓' : '⏳'}
                                </span>
                            </div>
                            <div class="section-actions">
                                <button class="btn-icon btn-small" onclick="editSection(${chapterIndex}, '${section.id}')" title="Edit Section">
                                    ✏️
                                </button>
                                <button class="btn-icon btn-small" onclick="deleteSection(${chapterIndex}, '${section.id}')" title="Delete Section">
                                    🗑️
                                </button>
                            </div>
                        </div>
                    `;
                }).join('');
                
                return `
                    <div class="chapter-card">
                        <div class="chapter-header">
                            <div class="chapter-header-left">
                                <div class="chapter-title">📖 ${chapter.title || `Chapter ${chapterIndex + 1}`}</div>
                                ${chapter.summary ? `<div class="chapter-summary">${chapter.summary}</div>` : ''}
                            </div>
                            <div class="chapter-actions">
                                <button class="btn-icon" onclick="editChapter(${chapterIndex})" title="Edit Chapter">
                                    ✏️
                                </button>
                                <button class="btn-icon" onclick="deleteChapter(${chapterIndex})" title="Delete Chapter">
                                    🗑️
                                </button>
                            </div>
                        </div>
                        
                        <div class="sections-container">
                            <div class="sections-header">
                                <div class="sections-title">📑 Sections (${sections.length})</div>
                                <button class="btn-add-section" onclick="openAddSectionModal(${chapterIndex})">
                                    ➕ Add Section
                                </button>
                            </div>
                            ${sections.length > 0 ? `
                                <div class="sections-list">
                                    ${sectionsHtml}
                                </div>
                            ` : `
                                <div class="empty-state" style="padding: 20px;">
                                    <p style="color: #999; font-size: 0.9em;">No sections yet. Click "Add Section" to create one.</p>
                                </div>
                            `}
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `<div class="chapters-list">${chaptersHtml}</div>`;
        }

        function showError(message) {
            document.getElementById('chaptersContainer').innerHTML = `
                <div class="empty-state">
                    <div class="icon">❌</div>
                    <h3>Error</h3>
                    <p>${message}</p>
                    <button onclick="goBack()" style="margin-top: 15px; padding: 10px 20px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer;">Go Back</button>
                </div>
            `;
        }

        function openAddChapterModal() {
            editingChapterIndex = null;
            document.getElementById('modalTitle').textContent = '➕ Add New Chapter';
            document.getElementById('chapterForm').reset();
            document.getElementById('chapterModal').style.display = 'block';
        }

        async function editChapter(index) {
            editingChapterIndex = index;
            const chapter = currentBook.chapters[index];
            
            document.getElementById('modalTitle').textContent = '✏️ Edit Chapter';
            document.getElementById('chapterTitle').value = chapter.title || '';
            document.getElementById('chapterSummary').value = chapter.summary || '';
            
            document.getElementById('chapterModal').style.display = 'block';
        }

        function closeChapterModal() {
            document.getElementById('chapterModal').style.display = 'none';
            editingChapterIndex = null;
        }

        // Section management functions
        function openAddSectionModal(chapterIndex) {
            currentChapterForSection = chapterIndex;
            editingSectionId = null;
            document.getElementById('sectionModalTitle').textContent = '➕ Add New Section';
            document.getElementById('sectionForm').reset();
            document.getElementById('sectionModal').style.display = 'block';
        }

        async function editSection(chapterIndex, sectionId) {
            currentChapterForSection = chapterIndex;
            editingSectionId = sectionId;
            
            const chapter = currentBook.chapters[chapterIndex];
            const section = chapter.sections.find(s => s.id === sectionId);
            
            if (!section) {
                alert('Section not found');
                return;
            }
            
            document.getElementById('sectionModalTitle').textContent = '✏️ Edit Section';
            document.getElementById('sectionTitle').value = section.title || '';
            
            // Load section content if exists
            if (section.content_file) {
                try {
                    const response = await fetch(`/generated_books/${currentBook.id}/${section.content_file}`);
                    if (response.ok) {
                        const content = await response.text();
                        document.getElementById('sectionContent').value = content;
                    }
                } catch (error) {
                    console.error('Error loading section content:', error);
                    document.getElementById('sectionContent').value = '';
                }
            } else {
                document.getElementById('sectionContent').value = '';
            }
            
            document.getElementById('sectionModal').style.display = 'block';
        }

        function closeSectionModal() {
            document.getElementById('sectionModal').style.display = 'none';
            currentChapterForSection = null;
            editingSectionId = null;
        }

        async function deleteSection(chapterIndex, sectionId) {
            const chapter = currentBook.chapters[chapterIndex];
            const section = chapter.sections.find(s => s.id === sectionId);
            
            if (!confirm(`⚠️ Delete section "${section.title}"?\n\nThis action cannot be undone!`)) {
                return;
            }

            try {
                const response = await fetch('/api/sections/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        book_id: currentBook.id,
                        chapter_index: chapterIndex,
                        section_id: sectionId
                    })
                });

                if (!response.ok) throw new Error('Failed to delete section');
                
                const result = await response.json();
                if (!result.success) throw new Error(result.error_message);

                await loadBook();
                alert('✅ Section deleted successfully!');

            } catch (error) {
                console.error('Error:', error);
                alert('❌ Error deleting section: ' + error.message);
            }
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const chapterModal = document.getElementById('chapterModal');
            const sectionModal = document.getElementById('sectionModal');
            if (event.target == chapterModal) {
                closeChapterModal();
            } else if (event.target == sectionModal) {
                closeSectionModal();
            }
        }

        // Chapter form handler
        document.getElementById('chapterForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const data = {
                book_id: currentBook.id,
                chapter_title: formData.get('chapter_title'),
                chapter_summary: formData.get('chapter_summary') || null
            };

            const btn = document.getElementById('saveChapterBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>💾 Saving...</span>';

            try {
                if (editingChapterIndex === null) {
                    // Create new chapter
                    const response = await fetch('/api/chapters', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(data)
                    });

                    if (!response.ok) throw new Error('Failed to create chapter');
                    
                    const result = await response.json();
                    if (!result.success) throw new Error(result.error_message);
                } else {
                    // Update existing chapter
                    const response = await fetch('/api/chapters/update', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            ...data,
                            chapter_index: editingChapterIndex
                        })
                    });

                    if (!response.ok) throw new Error('Failed to update chapter');
                    
                    const result = await response.json();
                    if (!result.success) throw new Error(result.error_message);
                }

                await loadBook();
                closeChapterModal();
                alert('✅ Chapter saved successfully!');

            } catch (error) {
                console.error('Error:', error);
                alert('❌ Error saving chapter: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>💾 Save Chapter</span>';
            }
        });

        // Section form handler
        document.getElementById('sectionForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = new FormData(e.target);
            const btn = document.getElementById('saveSectionBtn');
            btn.disabled = true;
            btn.innerHTML = '<span>💾 Saving...</span>';

            try {
                if (editingSectionId === null) {
                    // Create new section
                    const response = await fetch('/api/sections', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            book_id: currentBook.id,
                            chapter_index: currentChapterForSection,
                            section_title: formData.get('section_title')
                        })
                    });

                    if (!response.ok) throw new Error('Failed to create section');
                    
                    const result = await response.json();
                    if (!result.success) throw new Error(result.error_message);
                    
                    editingSectionId = result.section_id;
                }

                // Save content if provided
                const content = formData.get('markdown_content');
                if (content && content.trim()) {
                    const contentResponse = await fetch('/api/sections/content', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            book_id: currentBook.id,
                            chapter_index: currentChapterForSection,
                            section_id: editingSectionId,
                            markdown_content: content
                        })
                    });

                    if (!contentResponse.ok) throw new Error('Failed to save content');
                    
                    const contentResult = await contentResponse.json();
                    if (!contentResult.success) throw new Error(contentResult.error_message);
                }

                await loadBook();
                closeSectionModal();
                alert('✅ Section saved successfully!');

            } catch (error) {
                console.error('Error:', error);
                alert('❌ Error saving section: ' + error.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<span>💾 Save Section</span>';
            }
        });

        async function deleteChapter(index) {
            const chapter = currentBook.chapters[index];
            
            if (!confirm(`⚠️ Delete chapter "${chapter.title}"?\n\nThis action cannot be undone!`)) {
                return;
            }

            try {
                const response = await fetch('/api/chapters/delete', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        book_id: currentBook.id,
                        chapter_index: index
                    })
                });

                if (!response.ok) throw new Error('Failed to delete chapter');
                
                const result = await response.json();
                if (!result.success) throw new Error(result.error_message);

                // Reload book data
                await loadBook();
                alert('✅ Chapter deleted successfully!');

            } catch (error) {
                console.error('Error:', error);
                alert('❌ Error deleting chapter: ' + error.message);
            }
        }

        function goBack() {
            window.location.href = '/static/index.html';
        }
    </script>
</body>
</html>
